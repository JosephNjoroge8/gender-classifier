# fly.toml app configuration file generated for gender-classifier

app = "gender-classifier"
primary_region = "jnb"  # Johannesburg, closest to Kenya

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  APP_DEBUG = "false"
  LOG_CHANNEL = "stderr"

[[services]]
  protocol = "tcp"
  internal_port = 8080
  processes = ["app"]

  [services.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 800

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.http_checks]
    enabled = true
    grace_period = "30s"
    interval = "15s"
    timeout = "5s"
    method = "GET"
    path = "/api/classify?name=test"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[deploy]
  release_command = "php artisan migrate --force"
  strategy = "canary"
  wait_timeout = "300s"
